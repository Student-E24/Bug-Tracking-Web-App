<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="people">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="logo"><i class="ph-fill ph-bug"></i><span>Easy Tracker</span></div></div>
      <nav class="sidebar-nav">
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link"><i class="ph ph-squares-four"></i>Dashboard</a></li>
          <li><a href="issues.html" class="nav-link"><i class="ph ph-list-dashes"></i>All Issues</a></li>
          <li><a href="projects.html" class="nav-link"><i class="ph ph-folder"></i>Projects</a></li>
          <li><a href="people.html" class="nav-link active"><i class="ph ph-users"></i>People</a></li>
          <li><a href="settings.html" class="nav-link"><i class="ph ph-gear"></i>Settings</a></li>
        </ul>
        <div class="nav-section-title"><span>PROJECTS</span><i class="ph ph-caret-down"></i></div>
        <ul class="nav-links project-links" id="sidebar-projects-list"></ul>
      </nav>
      <div class="sidebar-footer"><button class="btn btn-primary btn-block" id="btn-new-issue"><i class="ph ph-plus"></i>New Issue</button></div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <h1 class="page-title">People</h1>
          <p class="page-subtitle">Create and manage team members</p>
        </div>
        <div class="top-bar-right">
          <div class="search-box"><i class="ph ph-magnifying-glass search-icon"></i><input id="search-input" type="text" placeholder="Search issues..."></div>
          <button class="btn btn-icon-only notification-trigger" id="btn-notifications" aria-label="Notifications">
            <i class="ph ph-bell"></i>
            <span class="notification-badge" id="notification-badge" hidden>0</span>
          </button>
        </div>
      </header>
      <div class="view-container" id="view-container"></div>
    </main>
  </div>

  <div id="modals-container"></div>

  <script src="js/storage.js"></script>
  <script src="js/people.js?v=2"></script>
  <script src="js/projects.js"></script>
  <script src="js/issues.js"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/forms.js?v=2"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
