<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugTrack Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
      <div class="login-brand">
        <i class="ph-fill ph-bug"></i>
        <span>BugTrack</span>
      </div>
      <h1 id="login-title">Admin Sign-In</h1>
      <p class="login-subtitle">Use your admin credentials to access the bug tracking dashboard.</p>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input class="form-input" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-input" id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <p id="login-error" class="login-error" hidden>Invalid username or password.</p>
        <button type="submit" class="btn btn-primary btn-block"><i class="ph ph-sign-in"></i>Sign In</button>
      </form>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script>
    if (!window.Auth) {
      throw new Error('Auth module failed to load.');
    }

    Auth.redirectIfLoggedIn();

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');

    form.addEventListener('submit', event => {
      event.preventDefault();
      const formData = new FormData(form);
      const username = formData.get('username');
      const password = formData.get('password');

      if (Auth.login(username, password)) {
        window.location.href = 'index.html';
        return;
      }

      errorBox.hidden = false;
    });
  </script>
</body>
</html>
